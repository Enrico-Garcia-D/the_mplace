name: Expo Mobile Build

# Trigger: Run this every time you push code to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Install and Build Expo App
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code onto the GitHub server
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js environment (UPDATED TO VERSION 20)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Setup Expo CLI tools
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      # 4. Install your project's packages
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 5. Build a preview for Android (Creates the APK automatically)
      - name: Build Android Preview
        run: eas build --platform android --profile preview --local --non-interactive